{% extends "base.html" %}

{% block title %}Edit Note{% endblock %}

{% block content %}
    <form class="note-form" action="{{ url_for('edit', note_id=note.id) }}" method="post">
        <h2>Edit a note</h2>
        <p>This form shows the current database values, then sends a POST request that updates the matching record.</p>
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
        <label for="title">Title</label>
        <input id="title" name="title" required value="{{ form.title }}">

        <label for="topic">Topic</label>
        <input id="topic" name="topic" required value="{{ form.topic }}">

        <label for="content">Content</label>
        <textarea id="content" name="content" required>{{ form.content }}</textarea>

        <div class="actions">
            <button type="submit">Update note</button>
            <a class="button secondary" href="{{ url_for('index') }}">Cancel</a>
        </div>
    </form>
{% endblock %}
